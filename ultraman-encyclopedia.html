<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奥特曼全系列图鉴 · Ultraman Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #13100f;
  --surface: #1c1817;
  --surface-raised: #25201e;
  --ultra-red: #e03131;
  --ultra-red-dim: rgba(224,49,49,0.12);
  --ultra-silver: #b8b8b8;
  --silver-dim: rgba(184,184,184,0.1);
  --text: #f0ebe4;
  --text-dim: #8a8580;
  --showa: #e03131;
  --heisei: #d97706;
  --reiwa: #2563eb;
  --radius: 6px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Subtle radial energy background */
body::before{
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(224,49,49,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(224,49,49,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* Hero */
.hero{
  position:relative; z-index:1;
  text-align: center;
  padding: clamp(40px,8vw,72px) clamp(16px,4vw,32px) clamp(24px,5vw,40px);
  border-bottom: 1px solid rgba(224,49,49,0.1);
}

.hero-badge{
  display: inline-block;
  font-family: 'Orbitron', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--ultra-red);
  border: 1px solid var(--ultra-red-dim);
  padding: 5px 14px;
  border-radius: 3px;
  margin-bottom: 20px;
}

.hero h1{
  font-size: clamp(26px,6vw,48px);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 12px;
}

.hero h1 .accent{
  color: var(--ultra-red);
  position: relative;
}

.hero p{
  font-size: 14px;
  color: var(--text-dim);
  max-width: 500px;
  margin: 0 auto;
}

.hero-stats{
  display: flex; gap: 32px; justify-content: center;
  margin-top: 28px;
  flex-wrap: wrap;
}

.hero-stat{
  text-align: center;
}

.hero-stat .num{
  font-family: 'Orbitron', monospace;
  font-size: 28px; font-weight: 900;
  color: var(--ultra-red);
}

.hero-stat .label{
  font-size: 11px; color: var(--text-dim);
  letter-spacing: 0.04em;
}

/* Controls bar */
.controls{
  position: sticky; top: 0; z-index: 10;
  background: rgba(19,16,15,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(224,49,49,0.08);
  padding: 12px clamp(16px,4vw,32px);
  display: flex; gap: 12px; align-items: center;
  flex-wrap: wrap;
}

.search-wrap{
  flex: 1; min-width: 180px; max-width: 320px;
  position: relative;
}

.search-wrap input{
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(224,49,49,0.15);
  border-radius: var(--radius);
  padding: 9px 14px 9px 36px;
  font-size: 13px; color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input:focus{ border-color: var(--ultra-red); }

.search-wrap input::placeholder{ color: var(--text-dim); }

.search-icon{
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}

.era-tabs{
  display: flex; gap: 4px;
}

.era-tab{
  font-family: 'Orbitron', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em;
  padding: 8px 16px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.era-tab:hover{ color: var(--text); border-color: rgba(255,255,255,0.1); }

.era-tab.active{
  color: var(--text);
  border-color: var(--ultra-red-dim);
  background: var(--ultra-red-dim);
}

.era-tab .count{
  font-size: 9px; opacity: 0.5; margin-left: 2px;
}

.result-info{
  font-size: 11px; color: var(--text-dim);
  margin-left: auto;
}

/* Grid */
.main-content{
  position:relative; z-index:1;
  padding: clamp(16px,3vw,28px) clamp(16px,4vw,32px) clamp(32px,6vw,56px);
}

.era-section{
  margin-bottom: 36px;
}

.era-heading{
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}

.era-dot{
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.era-dot.showa{ background: var(--showa); }
.era-dot.heisei{ background: var(--heisei); }
.era-dot.reiwa{ background: var(--reiwa); }

.era-heading h2{
  font-size: clamp(16px,3vw,20px);
  font-weight: 700;
}

.era-heading .era-range{
  font-size: 12px; color: var(--text-dim);
}

.card-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
  gap: clamp(10px, 1.5vw, 16px);
}

/* Card */
.card{
  background: var(--surface);
  border: 1px solid rgba(224,49,49,0.06);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column;
}

.card:hover{
  transform: translateY(-2px);
  border-color: rgba(224,49,49,0.2);
  box-shadow: 0 8px 24px rgba(224,49,49,0.06);
}

.card-visual{
  height: 120px;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

.card-energy{
  font-size: 56px;
  opacity: 0.85;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(224,49,49,0.3));
}

.card-visual::after{
  content: '';
  position: absolute; inset: 0;
  opacity: 0.5;
}

.card-era-tag{
  position: absolute; top: 10px; right: 10px;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border-radius: 3px;
  z-index: 2;
  text-transform: uppercase;
}

.card-era-tag.showa{ background: rgba(224,49,49,0.2); color: #f87171; }
.card-era-tag.heisei{ background: rgba(217,119,6,0.2); color: #fbbf24; }
.card-era-tag.reiwa{ background: rgba(37,99,235,0.2); color: #60a5fa; }

.card-body{
  padding: 14px 16px;
  flex: 1;
  display: flex; flex-direction: column;
}

.card-name{
  font-size: 16px; font-weight: 700;
  margin-bottom: 4px;
}

.card-year{
  font-size: 11px; color: var(--text-dim);
  margin-bottom: 8px;
}

.card-desc{
  font-size: 12px; color: var(--text-dim);
  line-height: 1.55;
  margin-bottom: 12px;
  flex: 1;
}

.card-tags{
  display: flex; flex-wrap: wrap; gap: 4px;
}

.tag{
  font-size: 10px; font-weight: 500;
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--silver-dim);
  color: var(--ultra-silver);
}

/* Empty state */
.empty-state{
  text-align: center;
  padding: 48px 16px;
  color: var(--text-dim);
}

.empty-state .empty-icon{
  font-size: 40px; margin-bottom: 12px; opacity: 0.4;
}

.empty-state p{ font-size: 13px; }

/* Footer */
.footer{
  text-align: center;
  padding: 24px;
  border-top: 1px solid rgba(224,49,49,0.06);
  font-size: 11px; color: var(--text-dim);
  position: relative; z-index: 1;
}

/* Responsive */
@media (max-width: 480px){
  .card-grid{ grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); }
  .card-visual{ height: 100px; }
  .card-energy{ font-size: 44px; }
  .card-name{ font-size: 14px; }
  .controls{ gap: 8px; }
  .era-tab{ padding: 6px 10px; font-size: 10px; }
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">M-78 · 光之国</div>
  <h1>奥特曼<span class="accent">全系列图鉴</span></h1>
  <p>从1966年初代到2025年奥美迦，跨越半个多世纪的光之巨人传奇</p>
  <div class="hero-stats">
    <div class="hero-stat"><span class="num">58</span><span class="label">位战士</span></div>
    <div class="hero-stat"><span class="num">60</span><span class="label">年传承</span></div>
    <div class="hero-stat"><span class="num">3</span><span class="label">个时代</span></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="搜索奥特曼..." autocomplete="off">

  <div class="era-tabs">

</div>

<main class="main-content" id="main-content"></main>

<footer class="footer">数据整理自官方资料 · Ultraman Series © Tsuburaya Productions</footer>

<script>
const ultramen = [

  {name:"初代奥特曼",year:1966,era:"showa",desc:"光之国的原点。来自M78星云的银色巨人，与早田进一心同体，用斯派修姆光线守护地球。",tags:["斯派修姆光线","光之国元祖","M78星云"],energy:"🔴"},

// Build visual color for each card based on era
ultramen.forEach(u => {
  if (u.era === 'showa') u.visualBg = 'linear-gradient(135deg, rgba(224,49,49,0.15), rgba(180,30,30,0.08))';
  else if (u.era === 'heisei') u.visualBg = 'linear-gradient(135deg, rgba(217,119,6,0.15), rgba(160,80,0,0.08))';
  else u.visualBg = 'linear-gradient(135deg, rgba(37,99,235,0.15), rgba(20,60,180,0.08))';
});

function renderAll(filterEra = 'all', searchTerm = '') {
  const main = document.getElementById('main-content');
  let filtered = ultramen;

  if (filterEra !== 'all') filtered = filtered.filter(u => u.era === filterEra);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(u =>
      u.name.includes(s) || u.desc.includes(s) || u.tags.some(t => t.includes(s))
    );
  }

  document.getElementById('result-info').textContent = `显示 ${filtered.length} 位`;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到匹配的奥特曼</p></div>`;
    return;
  }

  // Group by era
  const eras = filterEra === 'all' ? ['showa','heisei','reiwa'] : [filterEra];
  const eraNames = {showa:'昭和时代',heisei:'平成时代',reiwa:'令和时代'};
  const eraRanges = {showa:'1966 — 1980',heisei:'1990 — 2018',reiwa:'2019 — 2025'};

  main.innerHTML = eras.map(era => {
    const eraUltras = filtered.filter(u => u.era === era);
    if (eraUltras.length === 0) return '';

    const cards = eraUltras.map(u => `
      <div class="card" data-era="${u.era}">
        <div class="card-visual" style="background:${u.visualBg}">
          <span class="card-energy">${u.energy}</span>
          <span class="card-era-tag ${u.era}">${era}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${u.name}</div>
          <div class="card-year">登场 ${u.year}</div>
          <div class="card-desc">${u.desc}</div>
          <div class="card-tags">${u.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
    `).join('');

    return `
      <div class="era-section">
        <div class="era-heading">
          <div class="era-dot ${era}"></div>
          <h2>${eraNames[era]}</h2>
          <span class="era-range">${eraRanges[era]}</span>
        </div>
        <div class="card-grid">${cards}</div>
      </div>
    `;
  }).join('');
}

// Event handlers
document.getElementById('search').addEventListener('input', function() {
  const activeEra = document.querySelector('.era-tab.active').dataset.era;
  renderAll(activeEra, this.value);
});

document.querySelectorAll('.era-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.era-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    const searchVal = document.getElementById('search').value;
    renderAll(this.dataset.era, searchVal);
  });
});

// Init
renderAll();
</script>
