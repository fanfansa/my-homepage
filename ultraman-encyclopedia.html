<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奥特曼全系列图鉴 · Ultraman Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0b0a;
  --surface: #171412;
  --surface-card: #1c1714;
  --ultra-red: #e03131;
  --ultra-red-glow: rgba(224,49,49,0.15);
  --silver: #b0a89f;
  --silver-dim: rgba(176,168,159,0.08);
  --text: #eee6de;
  --text-dim: #8a8278;
  --text-muted: #5c5650;
  --showa: #e03131;
  --heisei: #d97706;
  --reiwa: #3b82f6;
  --radius: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 4px 20px rgba(224,49,49,0.03);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.5), 0 8px 32px rgba(224,49,49,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(224,49,49,0.04) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 30%,rgba(224,49,49,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(180,120,60,0.02) 0%,transparent 40%);
  pointer-events:none;z-index:0;
}

/* Hero */
.hero{
  position:relative;z-index:1;
  text-align:center;
  padding:clamp(36px,7vw,64px) clamp(16px,4vw,32px) clamp(20px,4vw,36px);
  border-bottom:1px solid rgba(224,49,49,0.08);
  background:linear-gradient(180deg,rgba(224,49,49,0.04) 0%,transparent 100%);
}

.hero-badge{
  display:inline-block;
  font-family:'Orbitron',monospace;
  font-size:10px;font-weight:700;
  letter-spacing:0.18em;
  color:var(--ultra-red);
  border:1px solid var(--ultra-red-glow);
  padding:5px 14px;border-radius:3px;
  margin-bottom:18px;
}

.hero h1{
  font-size:clamp(26px,5.5vw,44px);
  font-weight:900;letter-spacing:-0.02em;
  line-height:1.15;margin-bottom:10px;
}

.hero h1 .accent{color:var(--ultra-red);}

.hero .subtitle{
  font-size:14px;color:var(--text-dim);
  max-width:480px;margin:0 auto 24px;
}

.hero-stats{
  display:flex;gap:clamp(20px,3vw,36px);
  justify-content:center;flex-wrap:wrap;
}

.hero-stat{text-align:center;}

.hero-stat .num{
  font-family:'Orbitron',monospace;
  font-size:26px;font-weight:900;
  color:var(--ultra-red);
}

.hero-stat .label{
  font-size:11px;color:var(--text-dim);
  letter-spacing:0.05em;margin-top:2px;
}

/* Controls */
.controls{
  position:sticky;top:0;z-index:10;
  background:rgba(13,11,10,0.93);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(224,49,49,0.06);
  padding:12px clamp(16px,4vw,32px);
  display:flex;gap:12px;align-items:center;
  flex-wrap:wrap;
}

.search-wrap{
  flex:1;min-width:160px;max-width:300px;position:relative;
}

.search-wrap input{
  width:100%;
  background:var(--surface);
  border:1px solid rgba(224,49,49,0.12);
  border-radius:var(--radius);
  padding:9px 14px 9px 36px;
  font-size:13px;color:var(--text);
  font-family:inherit;outline:none;
  transition:border-color .2s;
}

.search-wrap input:focus{border-color:var(--ultra-red);}

.search-wrap input::placeholder{color:var(--text-muted);}

.search-icon{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  color:var(--text-dim);font-size:13px;
  pointer-events:none;
}

.era-tabs{display:flex;gap:4px;}

.era-tab{
  font-family:'Orbitron',monospace;
  font-size:10px;font-weight:700;
  letter-spacing:0.07em;
  padding:7px 14px;
  border:1px solid transparent;
  border-radius:var(--radius);
  background:none;
  color:var(--text-dim);
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}

.era-tab:hover{color:var(--text);border-color:rgba(255,255,255,0.08);}

.era-tab.active{
  color:var(--text);
  border-color:var(--ultra-red-glow);
  background:var(--ultra-red-glow);
}

.result-info{
  font-size:11px;color:var(--text-dim);
  margin-left:auto;
}

/* Main */
main{
  position:relative;z-index:1;
  padding:clamp(14px,2vw,20px) clamp(16px,4vw,32px) clamp(32px,6vw,48px);
}

.era-section{margin-bottom:40px;}

.era-heading{
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
  padding:0 2px;
}

.era-dot{
  width:10px;height:10px;border-radius:2px;flex-shrink:0;
}

.era-dot.showa{background:var(--showa);box-shadow:0 0 10px rgba(224,49,49,0.5);}
.era-dot.heisei{background:var(--heisei);box-shadow:0 0 10px rgba(217,119,6,0.5);}
.era-dot.reiwa{background:var(--reiwa);box-shadow:0 0 10px rgba(59,130,246,0.5);}

.era-heading h2{font-size:clamp(16px,2.5vw,19px);font-weight:700;}

.era-range{font-size:12px;color:var(--text-dim);}

/* Grid */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));
  gap:clamp(10px,1.2vw,14px);
}

/* Card */
.card{
  background:var(--surface-card);
  border:1px solid rgba(224,49,49,0.05);
  border-radius:var(--radius);
  overflow:hidden;
  transition:transform .25s cubic-bezier(.4,0,.2,1),border-color .25s,box-shadow .25s;
  display:flex;flex-direction:column;
}

.card:hover{
  transform:translateY(-3px);
  border-color:rgba(224,49,49,0.2);
  box-shadow:var(--shadow-hover);
}

.card-image{
  width:100%;
  aspect-ratio:3/4;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

.card-image img{
  width:100%;height:100%;
  object-fit:contain;
  padding:clamp(8px,2vw,16px);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
}

.card:hover .card-image img{
  transform:scale(1.06);
}

.card-era-tag{
  position:absolute;top:8px;right:8px;
  font-family:'Orbitron',monospace;
  font-size:9px;font-weight:700;letter-spacing:0.07em;
  padding:3px 8px;border-radius:3px;
  z-index:2;text-transform:uppercase;
  pointer-events:none;
}

.card-era-tag.showa{background:rgba(224,49,49,0.18);color:#f87171;}
.card-era-tag.heisei{background:rgba(217,119,6,0.18);color:#fbbf24;}
.card-era-tag.reiwa{background:rgba(59,130,246,0.18);color:#60a5fa;}

.card-body{
  padding:14px 16px 16px;
  flex:1;display:flex;flex-direction:column;
}

.card-name{
  font-size:15px;font-weight:700;margin-bottom:3px;
}

.card-year{
  font-size:11px;color:var(--text-dim);margin-bottom:8px;
}

.card-desc{
  font-size:12px;color:var(--text-dim);
  line-height:1.55;margin-bottom:10px;
  flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;
}

.card-tags{display:flex;flex-wrap:wrap;gap:5px;}

.tag{
  font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:3px;
  background:var(--silver-dim);color:var(--silver);
  line-height:1.4;
}

/* Empty */
.empty-state{
  text-align:center;padding:56px 16px;color:var(--text-dim);
}

.empty-state .empty-icon{font-size:44px;margin-bottom:12px;opacity:.35;}

.empty-state p{font-size:13px;}

/* Footer */
.footer{
  text-align:center;padding:20px;
  border-top:1px solid rgba(224,49,49,0.05);
  font-size:11px;color:var(--text-muted);
  position:relative;z-index:1;
}

.footer a{color:var(--ultra-red);text-decoration:none;}

@media (max-width:600px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));}
  .card-image{aspect-ratio:1/1;}
  .card-image img{padding:clamp(6px,2vw,12px);}
  .card-name{font-size:14px;}
  .controls{gap:8px;}
  .era-tab{padding:6px 10px;font-size:9px;}
  .hero h1{font-size:22px;}
}

@media (max-width:400px){
  .card-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .card-image{aspect-ratio:3/3.5;}
  .card-body{padding:10px 12px;}
  .card-name{font-size:13px;}
  .card-desc{display:none;}
  .card-tags{display:none;}
  .card-year{font-size:10px;margin-bottom:0;}
}

/* Blessing animation */
@keyframes blessingPulse {
  0%,100% { box-shadow:0 0 8px rgba(224,49,49,0.15),0 0 20px rgba(224,49,49,0.05); }
  50% { box-shadow:0 0 18px rgba(224,49,49,0.35),0 0 40px rgba(224,49,49,0.12); }
}
@keyframes blessingShimmer {
  0% { background-position:-200% center; }
  100% { background-position:200% center; }
}
.blessing {
  animation: blessingPulse 2s ease-in-out infinite;
}
.blessing p {
  background:linear-gradient(90deg,var(--ultra-red),#f87171,var(--ultra-red),#fca5a5,var(--ultra-red));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: blessingShimmer 2.5s linear infinite;
  font-weight:900 !important;
}

</style>
</head>

const eraNames = {showa:'昭和时代',heisei:'平成时代',reiwa:'令和时代'};
const eraRanges = {showa:'1966 — 1980',heisei:'1990 — 2018',reiwa:'2019 — 2025'};
const eraOrder = ['showa','heisei','reiwa'];

function render(era='all',search=''){
  const main = document.getElementById('main-content');
  let filtered = ultramen;

  if(era!=='all') filtered = filtered.filter(u=>u.era===era);
  if(search){
    const s = search.toLowerCase();
    filtered = filtered.filter(u=>
      u.name.includes(s)||u.desc.includes(s)||u.tags.some(t=>t.includes(s))
    );
  }

  document.getElementById('result-info').textContent = '显示 '+filtered.length+' 位';

  if(filtered.length===0){
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x1F50D;</div><p>没有找到匹配的奥特曼</p></div>';
    return;
  }

  const eras = era==='all' ? eraOrder : [era];

  main.innerHTML = eras.map(e=>{
    const items = filtered.filter(u=>u.era===e);
    if(!items.length)return'';

    const cards = items.map(u=>`
      <div class="card" data-era="${u.era}">
        <div class="card-image">
          <img src="${u.img}" alt="${u.name}" loading="eager" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<span style=color:var(--text-muted);font-size:32px>&#x2728;</span>'">
          <span class="card-era-tag ${u.era}">${e}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${u.name}</div>
          <div class="card-year">登场 ${u.year}</div>
          <div class="card-desc">${u.desc}</div>
          <div class="card-tags">${u.tags.map(t=>'<span class="tag">'+t+'</span>').join('')}</div>
        </div>
      </div>
    `).join('');

    return `<div class="era-section">
      <div class="era-heading">
        <div class="era-dot ${e}"></div>
        <h2>${eraNames[e]}</h2>
        <span class="era-range">${eraRanges[e]}</span>
      </div>
      <div class="card-grid">${cards}</div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input',function(){
  const era = document.querySelector('.era-tab.active').dataset.era;
  render(era,this.value);
});

document.querySelectorAll('.era-tab').forEach(t=>{
  t.addEventListener('click',function(){
    document.querySelectorAll('.era-tab').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    render(this.dataset.era,document.getElementById('search').value);
  });
});

render();
</script>
