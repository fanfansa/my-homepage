<html lang="zh-CN">

<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Chivo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --pitch: #0d2818;
  --pitch-light: #143a24;
  --grass: #1e5631;
  --gold: #c9a84c;
  --gold-bright: #e6c864;
  --chalk: #e8e4db;
  --chalk-dim: #9e9a90;
  --red-card: #c0392b;
  --advance: #27ae60;
  --eliminate: #7f8c8d;
  --surface: #0f1f15;
  --surface-raised: #162a1d;
  --border-subtle: rgba(201,168,76,0.12);
  --border-active: rgba(201,168,76,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--pitch);
  color: var(--chalk);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Pitch line texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.008) 79px, rgba(255,255,255,0.008) 80px),
    repeating-linear-gradient(90deg, transparent, transparent 119px, rgba(255,255,255,0.006) 119px, rgba(255,255,255,0.006) 120px);
  pointer-events: none; z-index: 0;
}

.header {
  position: relative; z-index: 1;
  padding: clamp(20px,5vw,40px) clamp(16px,4vw,48px);
  border-bottom: 1px solid var(--border-subtle);
  background: linear-gradient(180deg, var(--surface-raised) 0%, transparent 100%);
}

.header-top {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
  margin-bottom: 8px;
}

.logo-area {
  display: flex; align-items: center; gap: 10px;
}

.trophy-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #e6c864, #b8942e);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.main-title {
  font-family: 'Chivo', sans-serif;
  font-weight: 900;
  font-size: clamp(20px,4vw,28px);
  letter-spacing: -0.02em;
  color: var(--chalk);
}

.main-title span {
  color: var(--gold);
}

.subtitle {
  font-size: 12px;
  color: var(--chalk-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-meta {
  display: flex; gap: 16px; align-items: center;
  font-size: 12px; color: var(--chalk-dim);
}

.header-meta .updated {
  background: var(--surface-raised);
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border-subtle);
  font-size: 11px;
}

/* Tab Navigation */
.tab-nav {
  position: relative; z-index: 1;
  display: flex; gap: 0;
  padding: 0 clamp(16px,4vw,48px);
  border-bottom: 1px solid var(--border-subtle);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-nav::-webkit-scrollbar { height: 0; }

.tab-btn {
  font-family: 'Chivo', sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 14px 20px;
  background: none; border: none;
  color: var(--chalk-dim);
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s;
}

.tab-btn:hover { color: var(--chalk); }

.tab-btn.active {
  color: var(--gold-bright);
}

.tab-btn.active::after {
  content: '';
  position: absolute; bottom: -1px; left: 20px; right: 20px;
  height: 2px; background: var(--gold);
  border-radius: 2px 2px 0 0;
}

.tab-badge {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  background: var(--surface-raised);
  color: var(--chalk-dim);
  padding: 2px 7px; border-radius: 10px;
  margin-left: 6px;
  vertical-align: 1px;
}

.tab-btn.active .tab-badge {
  background: rgba(201,168,76,0.15);
  color: var(--gold);
}

/* Main Content */
.main-content {
  position: relative; z-index: 1;
  padding: clamp(16px,3vw,28px) clamp(16px,4vw,48px);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Standings Grid */
.standings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 360px), 1fr));
  gap: clamp(12px, 2vw, 20px);
}

.group-card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.group-card:hover {
  border-color: var(--border-active);
}

.group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface-raised);
  border-bottom: 1px solid var(--border-subtle);
}

.group-label {
  font-family: 'Chivo', sans-serif;
  font-weight: 900; font-size: 14px;
  color: var(--gold);
  letter-spacing: 0.02em;
}

.group-status {
  font-size: 10px; color: var(--chalk-dim);
  letter-spacing: 0.04em;
}

.standings-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}

.standings-table th {
  text-align: left; font-weight: 500;
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--chalk-dim);
  padding: 8px 6px;
  border-bottom: 1px solid var(--border-subtle);
}

.standings-table th:first-child { padding-left: 16px; }
.standings-table th:last-child { padding-right: 16px; text-align: center; }

.standings-table th.col-num { text-align: center; width: 28px; }
.standings-table th.col-pts { text-align: center; width: 36px; }

.standings-table td {
  padding: 7px 6px;
  border-bottom: 1px solid rgba(201,168,76,0.04);
  vertical-align: middle;
}

.standings-table td:first-child { padding-left: 16px; }
.standings-table td:last-child { padding-right: 16px; text-align: center; }

.standings-table td.col-num { text-align: center; color: var(--chalk-dim); width: 28px; }
.standings-table td.col-pts { text-align: center; font-weight: 700; font-family: 'Chivo', sans-serif; width: 36px; }

.standings-table tr:last-child td { border-bottom: none; }

.team-cell {
  display: flex; align-items: center; gap: 8px;
}

.team-flag {
  width: 20px; height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}

.team-name {
  font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

/* Status badges */
.badge {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 6px; border-radius: 3px;
  margin-left: 6px;
  text-transform: uppercase;
}

.badge-advance {
  background: rgba(39,174,96,0.15);
  color: #2ecc71;
}

.badge-eliminate {
  background: rgba(192,57,43,0.12);
  color: #e74c3c;
}

.badge-pending {
  background: rgba(201,168,76,0.1);
  color: var(--chalk-dim);
}

/* Top rank highlight */
.standings-table tr.top-2 td {
  background: rgba(201,168,76,0.03);
}

/* Scorers & Assists */
.rank-list {
  max-width: 680px;
}

.rank-header {
  display: grid;
  grid-template-columns: 40px 1fr 60px 80px;
  gap: 8px;
  padding: 8px 16px;
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--chalk-dim);
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 4px;
}

.rank-row {
  display: grid;
  grid-template-columns: 40px 1fr 60px 80px;
  gap: 8px;
  align-items: center;
  padding: 10px 16px;
  border-radius: 4px;
  transition: background 0.15s;
  border-bottom: 1px solid rgba(201,168,76,0.03);
}

.rank-row:hover {
  background: var(--surface-raised);
}

.rank-pos {
  font-family: 'Chivo', sans-serif;
  font-weight: 900; font-size: 16px;
  text-align: center;
}

.rank-pos.gold { color: var(--gold); }
.rank-pos.silver { color: #b0b0b0; }
.rank-pos.bronze { color: #cd7f32; }

.player-cell {
  display: flex; align-items: center; gap: 10px;
}

.player-nation {
  font-size: 10px; color: var(--chalk-dim);
}

.player-name {
  font-weight: 600; font-size: 14px;
}

.stat-highlight {
  font-family: 'Chivo', sans-serif;
  font-weight: 900; font-size: 18px;
  text-align: center;
  color: var(--gold-bright);
}

.stat-label {
  font-size: 10px; color: var(--chalk-dim);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

/* Summary Banner */
.summary-banner {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-bottom: 24px;
}

.summary-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  font-size: 11px;
}

.summary-chip .chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
}

.chip-dot.green { background: #27ae60; }
.chip-dot.red { background: #c0392b; }
.chip-dot.gold { background: var(--gold); }

/* Responsive */
@media (max-width: 480px) {
  .standings-table { font-size: 11px; }
  .standings-table th { font-size: 9px; padding: 6px 3px; }
  .standings-table td { padding: 5px 3px; }
  .standings-table th:first-child, .standings-table td:first-child { padding-left: 10px; }
  .standings-table th:last-child, .standings-table td:last-child { padding-right: 10px; }
  .team-name { font-size: 11px; }
  .rank-row { grid-template-columns: 30px 1fr 50px 60px; padding: 8px 10px; gap: 4px; }
  .rank-header { grid-template-columns: 30px 1fr 50px 60px; padding: 6px 10px; gap: 4px; }
  .player-name { font-size: 12px; }
  .stat-highlight { font-size: 15px; }
  .tab-btn { padding: 12px 14px; font-size: 11px; }
  .main-title { font-size: 18px; }
}

/* Section title */
.section-label {
  font-family: 'Chivo', sans-serif;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--chalk-dim);
  margin-bottom: 12px;
  padding-left: 2px;
}

.advancing-section {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border-subtle);
}

.advancing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.advancing-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border-radius: 4px;
  font-size: 12px;
  border: 1px solid var(--border-subtle);
}

.advancing-row .rank-num {
  font-family: 'Chivo', sans-serif;
  font-weight: 900; font-size: 13px;
  color: var(--chalk-dim);
  width: 20px;
}

.footer-note {
  margin-top: 32px;
  padding: 16px 0;
  font-size: 10px; color: var(--chalk-dim);
  text-align: center;
  border-top: 1px solid var(--border-subtle);
}
</style>
</head>

// === RENDER ===

function statusBadge(s) {
  if (s==='advance') return '<span class="badge badge-advance">已出线</span>';
  if (s==='eliminate') return '<span class="badge badge-eliminate">已出局</span>';
  return '';
}

function renderStandings() {
  const grid = document.getElementById('standings-grid');
  grid.innerHTML = '';

  for (const [key, g] of Object.entries(groups)) {
    const statusText = g.complete ? '已完赛' : '进行中';
    let rows = '';
    g.teams.forEach((t,i) => {
      const topClass = i < 2 ? ' top-2' : '';
      rows += `<tr class="${topClass}">
        <td class="col-num">${i+1}</td>
        <td><div class="team-cell"><span>${t.flag}</span><span class="team-name">${t.name}</span>${statusBadge(t.status)}</div></td>
        <td class="col-num">${t.w}</td>
        <td class="col-num">${t.d}</td>
        <td class="col-num">${t.l}</td>
        <td class="col-num">${t.gf}</td>
        <td class="col-num">${t.ga}</td>
        <td class="col-num">${t.gd>0?'+':''}${t.gd}</td>
        <td class="col-pts">${t.pts}</td>
      </tr>`;
    });

    grid.innerHTML += `
      <div class="group-card">
        <div class="group-header">
          <span class="group-label">${g.label}</span>
          <span class="group-status">${statusText}</span>
        </div>
        <table class="standings-table">
          <thead><tr>
            <th class="col-num">#</th><th>球队</th>
            <th class="col-num">胜</th><th class="col-num">平</th><th class="col-num">负</th>
            <th class="col-num">进</th><th class="col-num">失</th><th class="col-num">净</th>
            <th class="col-pts">分</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }
}

function renderThirdPlace() {
  // Collect all 3rd place teams
  const thirds = [];
  for (const g of Object.values(groups)) {
    if (g.teams.length >= 3) thirds.push(g.teams[2]);
  }
  thirds.sort((a,b) => b.pts-a.pts || (b.gd||0)-(a.gd||0) || (b.gf||0)-(a.gf||0));

  const grid = document.getElementById('third-place-grid');
  grid.innerHTML = thirds.map((t,i) => {
    const cls = i < 8 ? 'advancing-row' : 'advancing-row';
    const mark = i < 8 ? '✓' : '';
    return `<div class="${cls}" style="opacity:${i<8?1:0.5}">
      <span class="rank-num">${i+1}</span>
      <span>${t.flag}</span>
      <span style="flex:1">${t.name}</span>
      <span style="font-weight:600;font-size:12px">${t.pts}分</span>
      <span style="font-size:10px;color:var(--chalk-dim)">${(t.gd||0)>0?'+':''}${t.gd||0}</span>
      ${i<8?'<span style="color:var(--advance);font-size:10px;font-weight:700">晋级区</span>':''}
    </div>`;
  }).join('');
}

function posClass(p) {
  if (p===1) return 'gold';
  if (p===2) return 'silver';
  if (p===3) return 'bronze';
  return '';
}

function renderScorers() {
  const list = document.getElementById('scorers-list');
  list.innerHTML = scorers.map(s => `
    <div class="rank-row">
      <div class="rank-pos ${posClass(s.pos)}">${s.pos}</div>
      <div class="player-cell">
        <span class="player-name">${s.name}</span>
      </div>
      <div class="stat-highlight">${s.goals}</div>
      <div class="player-nation" style="text-align:center">${s.nation}</div>
    </div>
  `).join('');
}

function renderAssists() {
  const list = document.getElementById('assists-list');
  list.innerHTML = assists.map(a => `
    <div class="rank-row">
      <div class="rank-pos ${posClass(a.pos)}">${a.pos}</div>
      <div class="player-cell">
        <span class="player-name">${a.name}</span>
      </div>
      <div class="stat-highlight">${a.assists}</div>
      <div class="player-nation" style="text-align:center">${a.nation}</div>
    </div>
  `).join('');
}

// === TAB SWITCHING ===
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});
